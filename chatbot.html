<!-- ============================================================
     Metric Networks — Tier 2 Chatbot Widget
     Friendly decision-tree + free-text hybrid
     Injects into index.html before </body>
     ============================================================ -->

<!-- Chatbot Toggle Button -->
<div id="mn-chat-btn" onclick="mnChatToggle()" aria-label="Chat with Metric" title="Chat with Metric">
  <div id="mn-chat-pulse"></div>
  <svg id="mn-chat-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
  <svg id="mn-chat-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="display:none">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
</div>

<!-- Chatbot Window -->
<div id="mn-chat-window" aria-live="polite">
  <div id="mn-chat-header">
    <div id="mn-chat-avatar">M</div>
    <div>
      <div id="mn-chat-name">Metric</div>
      <div id="mn-chat-status"><span id="mn-status-dot"></span> Online now</div>
    </div>
    <button onclick="mnChatToggle()" id="mn-chat-x" aria-label="Close chat">✕</button>
  </div>
  <div id="mn-chat-messages"></div>
  <div id="mn-chat-options"></div>
  <div id="mn-chat-input-wrap" style="display:none">
    <input id="mn-chat-input" type="text" placeholder="Type your message..." autocomplete="off" maxlength="300">
    <button id="mn-chat-send" onclick="mnSendText()" aria-label="Send">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<style>
/* ── Toggle Button ── */
#mn-chat-btn {
  position: fixed; bottom: 28px; right: 28px; z-index: 9998;
  width: 58px; height: 58px; border-radius: 50%;
  background: linear-gradient(135deg, #00d084, #00a86b);
  box-shadow: 0 4px 20px rgba(0,208,132,0.45);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: transform .2s, box-shadow .2s;
  color: #fff;
}
#mn-chat-btn:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(0,208,132,0.55); }
#mn-chat-pulse {
  position: absolute; width: 100%; height: 100%; border-radius: 50%;
  background: rgba(0,208,132,0.35); animation: mn-pulse 2.5s ease-out infinite;
}
@keyframes mn-pulse {
  0% { transform: scale(1); opacity: .7; }
  70% { transform: scale(1.55); opacity: 0; }
  100% { transform: scale(1.55); opacity: 0; }
}

/* ── Chat Window ── */
#mn-chat-window {
  position: fixed; bottom: 100px; right: 28px; z-index: 9997;
  width: 360px; max-width: calc(100vw - 40px);
  background: #fff; border-radius: 20px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.18), 0 4px 16px rgba(0,0,0,0.08);
  display: flex; flex-direction: column; overflow: hidden;
  transform: scale(.92) translateY(16px); opacity: 0; pointer-events: none;
  transition: transform .25s cubic-bezier(.34,1.56,.64,1), opacity .2s;
  max-height: 560px;
}
#mn-chat-window.open {
  transform: scale(1) translateY(0); opacity: 1; pointer-events: all;
}

/* ── Header ── */
#mn-chat-header {
  background: linear-gradient(135deg, #0d1117, #1c2333);
  padding: 16px 18px; display: flex; align-items: center; gap: 12px;
}
#mn-chat-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  background: linear-gradient(135deg, #00d084, #00a86b);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 16px; color: #fff; flex-shrink: 0;
}
#mn-chat-name { font-weight: 700; font-size: 15px; color: #fff; }
#mn-chat-status { font-size: 12px; color: rgba(255,255,255,.65); display: flex; align-items: center; gap: 5px; margin-top: 1px; }
#mn-status-dot { width: 7px; height: 7px; border-radius: 50%; background: #00d084; display: inline-block; animation: mn-blink 2s infinite; }
@keyframes mn-blink { 0%,100% { opacity:1 } 50% { opacity:.4 } }
#mn-chat-x { margin-left: auto; background: none; border: none; color: rgba(255,255,255,.5); font-size: 18px; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: color .15s; }
#mn-chat-x:hover { color: #fff; }

/* ── Messages ── */
#mn-chat-messages {
  flex: 1; overflow-y: auto; padding: 18px 16px 10px;
  display: flex; flex-direction: column; gap: 10px;
  min-height: 180px; max-height: 300px;
  background: #f9fafb;
}
#mn-chat-messages::-webkit-scrollbar { width: 4px; }
#mn-chat-messages::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 2px; }

.mn-msg { display: flex; gap: 8px; align-items: flex-end; animation: mn-fade-in .25s ease; }
@keyframes mn-fade-in { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }
.mn-msg.bot { justify-content: flex-start; }
.mn-msg.user { justify-content: flex-end; }
.mn-msg-avatar { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg,#00d084,#00a86b); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; color:#fff; flex-shrink:0; }
.mn-bubble {
  max-width: 78%; padding: 10px 14px; border-radius: 16px;
  font-size: 13.5px; line-height: 1.55; font-family: 'Inter', sans-serif;
}
.mn-msg.bot .mn-bubble { background: #fff; color: #111827; border: 1px solid #e5e7eb; border-bottom-left-radius: 4px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
.mn-msg.user .mn-bubble { background: linear-gradient(135deg,#00d084,#00a86b); color: #fff; border-bottom-right-radius: 4px; }

/* Typing indicator */
.mn-typing { display: flex; align-items: center; gap: 4px; padding: 10px 14px; background: #fff; border: 1px solid #e5e7eb; border-radius: 16px; border-bottom-left-radius: 4px; width: fit-content; }
.mn-typing span { width: 7px; height: 7px; border-radius: 50%; background: #9ca3af; animation: mn-bounce .9s infinite; }
.mn-typing span:nth-child(2) { animation-delay: .15s; }
.mn-typing span:nth-child(3) { animation-delay: .3s; }
@keyframes mn-bounce { 0%,60%,100% { transform:translateY(0) } 30% { transform:translateY(-6px) } }

/* ── Options / Pills ── */
#mn-chat-options {
  padding: 10px 14px 14px; background: #f9fafb;
  display: flex; flex-wrap: wrap; gap: 8px;
  border-top: 1px solid #f3f4f6;
}
.mn-opt {
  padding: 8px 14px; border-radius: 20px;
  border: 1.5px solid #00d084; background: #fff;
  color: #00a86b; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .15s; font-family: 'Inter', sans-serif;
  line-height: 1.2;
}
.mn-opt:hover { background: #00d084; color: #fff; transform: translateY(-1px); }
.mn-opt.urgent { border-color: #ef4444; color: #ef4444; }
.mn-opt.urgent:hover { background: #ef4444; color: #fff; }

/* ── Text Input ── */
#mn-chat-input-wrap {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 14px; border-top: 1px solid #e5e7eb; background: #fff;
}
#mn-chat-input {
  flex: 1; border: 1.5px solid #e5e7eb; border-radius: 20px;
  padding: 9px 14px; font-size: 13.5px; font-family: 'Inter', sans-serif;
  outline: none; transition: border .15s; color: #111827; background: #f9fafb;
}
#mn-chat-input:focus { border-color: #00d084; background: #fff; }
#mn-chat-send {
  width: 38px; height: 38px; border-radius: 50%; border: none;
  background: linear-gradient(135deg,#00d084,#00a86b); color: #fff;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: transform .15s;
}
#mn-chat-send:hover { transform: scale(1.08); }

/* ── Emergency banner ── */
.mn-emergency {
  background: linear-gradient(135deg, #7f1d1d, #991b1b);
  border-radius: 12px; padding: 14px 16px; margin: 4px 0;
  display: flex; flex-direction: column; gap: 8px;
}
.mn-emergency-title { font-weight: 700; color: #fca5a5; font-size: 14px; }
.mn-emergency-sub { color: #fecaca; font-size: 13px; }
.mn-emergency-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: #ef4444; color: #fff; border: none;
  padding: 10px 18px; border-radius: 10px; font-weight: 700; font-size: 14px;
  cursor: pointer; text-decoration: none; font-family: 'Inter', sans-serif;
  transition: background .15s; margin-top: 4px; width: fit-content;
}
.mn-emergency-btn:hover { background: #dc2626; }

@media (max-width: 480px) {
  #mn-chat-window { right: 12px; bottom: 90px; width: calc(100vw - 24px); }
  #mn-chat-btn { right: 16px; bottom: 20px; }
}
</style>

<script>
(function() {
  const PHONE = '865-269-2907';
  const PHONE_LINK = 'tel:+18652692907';
  const EMAIL = 'support@metricnetworks.net';
  const WEB3_KEY = '9aa1c57c-c649-462e-84c0-0695cf66b356';
  let isOpen = false;
  let leadData = {};

  // ── Flow nodes ─────────────────────────────────────────
  const FLOW = {
    start: {
      msg: ["Hey there! 👋 I'm **Metric**, your Metric Networks assistant.", "I can help you with IT services, get you a free consultation, or connect you with our team right away.", "What brings you in today?"],
      opts: [
        { label: '🔧 I need IT support', next: 'support' },
        { label: '🌐 Tell me about your services', next: 'services' },
        { label: '📅 Book a consultation', next: 'book_name' },
        { label: '🚨 Emergency — I need help NOW', next: 'emergency', urgent: true },
      ]
    },
    emergency: {
      msg: null, // handled specially
      opts: []
    },
    support: {
      msg: ["Got it — let's get you to the right place.", "What kind of support do you need?"],
      opts: [
        { label: '💻 Computer / device issue', next: 'support_general' },
        { label: '🌐 Network / internet down', next: 'support_network' },
        { label: '💾 Data / backup concern', next: 'support_backup' },
        { label: '🚨 Total outage — urgent!', next: 'emergency', urgent: true },
      ]
    },
    support_general: {
      msg: ["For device issues, our team is standing by Monday–Friday 8AM–5PM.", "Want me to get your info so we can call you back, or would you prefer to call us directly?"],
      opts: [
        { label: '📞 Call me back', next: 'book_name' },
        { label: '📱 I\'ll call you now', next: 'call_us' },
      ]
    },
    support_network: {
      msg: ["Network outages can really hurt — we understand urgency here.", "Are you completely down, or is it intermittent?"],
      opts: [
        { label: '🔴 Completely down', next: 'emergency', urgent: true },
        { label: '🟡 Intermittent issues', next: 'book_name' },
      ]
    },
    support_backup: {
      msg: ["Data protection is critical. We handle backup solutions and recovery.", "Are you experiencing an active data loss event, or looking to set up backup protection?"],
      opts: [
        { label: '🚨 Active data loss NOW', next: 'emergency', urgent: true },
        { label: '🛡️ I want to set up backup', next: 'book_name' },
      ]
    },
    services: {
      msg: ["Metric Networks specializes in three core areas — which are you most interested in?"],
      opts: [
        { label: '🌐 Networking', next: 'svc_networking' },
        { label: '🖥️ Managed IT Services', next: 'svc_managed' },
        { label: '💾 Backup & Data Protection', next: 'svc_backup' },
        { label: '📅 Book a free consultation', next: 'book_name' },
      ]
    },
    svc_networking: {
      msg: ["We design, install, and manage networks for businesses of all sizes — from small offices to multi-site enterprises.", "This includes switching, routing, wireless, VPNs, and ongoing monitoring.", "Want to talk to someone about your network needs?"],
      opts: [
        { label: '📅 Book a consultation', next: 'book_name' },
        { label: '← See other services', next: 'services' },
      ]
    },
    svc_managed: {
      msg: ["Our Managed IT Services give you a full IT department without the full-time cost.", "We handle monitoring, maintenance, patch management, helpdesk support, and vendor management — all under one roof."],
      opts: [
        { label: '📅 Book a consultation', next: 'book_name' },
        { label: '← See other services', next: 'services' },
      ]
    },
    svc_backup: {
      msg: ["We implement and manage backup solutions that keep your data safe whether you face hardware failure, ransomware, or accidental deletion.", "Onsite, offsite, and cloud-based backup options available."],
      opts: [
        { label: '📅 Book a consultation', next: 'book_name' },
        { label: '← See other services', next: 'services' },
      ]
    },
    call_us: {
      msg: [`Give us a call anytime during business hours (Mon–Fri 8AM–5PM):\n\n📞 **${PHONE}**\n\nFor after-hours emergencies, we're on-call 24/7 — don't hesitate to call.`],
      opts: [
        { label: '🏠 Start over', next: 'start' },
      ]
    },
    // Lead capture flow
    book_name: {
      msg: ["I'd love to set that up! Let's get a few quick details.", "What's your **name**?"],
      opts: [], input: true, inputPlaceholder: 'Your full name...', inputNext: 'book_company', inputField: 'name'
    },
    book_company: {
      msg: ["Nice to meet you, {name}! 👋", "What's your **company name**?"],
      opts: [], input: true, inputPlaceholder: 'Company name...', inputNext: 'book_phone', inputField: 'company'
    },
    book_phone: {
      msg: ["What's the best **phone number** to reach you?"],
      opts: [], input: true, inputPlaceholder: 'Phone number...', inputNext: 'book_service', inputField: 'phone'
    },
    book_service: {
      msg: ["Almost done! Which service are you most interested in?"],
      opts: [
        { label: '🌐 Networking', next: 'book_confirm', data: {service:'Networking'} },
        { label: '🖥️ Managed IT', next: 'book_confirm', data: {service:'Managed IT'} },
        { label: '💾 Backup & Data Protection', next: 'book_confirm', data: {service:'Backup & Data Protection'} },
        { label: '🤔 Not sure yet', next: 'book_confirm', data: {service:'General Inquiry'} },
      ]
    },
    book_confirm: {
      msg: null, // built dynamically
      opts: []
    },
    done: {
      msg: ["We've got your info and will be in touch **within 1 business day**. 🎉", "Is there anything else I can help you with?"],
      opts: [
        { label: '🌐 Learn about services', next: 'services' },
        { label: '📞 Call us directly', next: 'call_us' },
        { label: '✅ I\'m all set, thanks!', next: 'goodbye' },
      ]
    },
    goodbye: {
      msg: ["Thanks for stopping by! We look forward to working with you.", "Have a great day! 👋"],
      opts: []
    }
  };

  // ── Helpers ─────────────────────────────────────────────
  function el(id) { return document.getElementById(id); }

  function parseMd(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
  }

  function scrollBottom() {
    const m = el('mn-chat-messages');
    setTimeout(() => m.scrollTop = m.scrollHeight, 50);
  }

  function addMsg(text, role='bot') {
    const msgs = el('mn-chat-messages');
    const div = document.createElement('div');
    div.className = `mn-msg ${role}`;
    if (role === 'bot') {
      div.innerHTML = `<div class="mn-msg-avatar">M</div><div class="mn-bubble">${parseMd(text)}</div>`;
    } else {
      div.innerHTML = `<div class="mn-bubble">${parseMd(text)}</div>`;
    }
    msgs.appendChild(div);
    scrollBottom();
  }

  function showTyping() {
    const msgs = el('mn-chat-messages');
    const t = document.createElement('div');
    t.className = 'mn-msg bot'; t.id = 'mn-typing';
    t.innerHTML = '<div class="mn-msg-avatar">M</div><div class="mn-typing"><span></span><span></span><span></span></div>';
    msgs.appendChild(t);
    scrollBottom();
    return t;
  }

  function removeTyping() {
    const t = document.getElementById('mn-typing');
    if (t) t.remove();
  }

  function setOptions(opts) {
    const o = el('mn-chat-options');
    o.innerHTML = '';
    opts.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'mn-opt' + (opt.urgent ? ' urgent' : '');
      btn.textContent = opt.label;
      btn.onclick = () => handleOption(opt);
      o.appendChild(btn);
    });
  }

  function setInput(show, placeholder='') {
    const wrap = el('mn-chat-input-wrap');
    const inp = el('mn-chat-input');
    wrap.style.display = show ? 'flex' : 'none';
    if (show) {
      inp.placeholder = placeholder || 'Type your message...';
      inp.value = '';
      setTimeout(() => inp.focus(), 100);
    }
  }

  function interpolate(text) {
    return text.replace(/\{(\w+)\}/g, (_, k) => leadData[k] || '');
  }

  // ── Emergency node ─────────────────────────────────────
  function showEmergency() {
    const msgs = el('mn-chat-messages');
    const div = document.createElement('div');
    div.className = 'mn-msg bot';
    div.innerHTML = `<div class="mn-msg-avatar">M</div>
      <div class="mn-emergency">
        <div class="mn-emergency-title">🚨 Emergency Support</div>
        <div class="mn-emergency-sub">We're on-call 24/7 for emergencies. Call us right now:</div>
        <a href="${PHONE_LINK}" class="mn-emergency-btn">📞 Call ${PHONE}</a>
        <div class="mn-emergency-sub" style="font-size:12px;margin-top:4px">Average response time: under 30 minutes</div>
      </div>`;
    msgs.appendChild(div);
    setOptions([{ label: '← Not an emergency', next: 'start' }]);
    scrollBottom();
  }

  // ── Navigate to a node ─────────────────────────────────
  function goTo(nodeId, delay=600) {
    const node = FLOW[nodeId];
    if (!node) return;

    setOptions([]);
    setInput(false);

    if (nodeId === 'emergency') { showTyping(); setTimeout(() => { removeTyping(); showEmergency(); }, delay); return; }

    if (nodeId === 'book_confirm') {
      const typing = showTyping();
      setTimeout(() => {
        removeTyping();
        addMsg(`Here's what I have:\n\n👤 **${leadData.name}**\n🏢 ${leadData.company}\n📞 ${leadData.phone}\n🔧 ${leadData.service || 'General Inquiry'}\n\nShall I send this to our team?`);
        setOptions([
          { label: '✅ Yes, send it!', next: 'submit_lead' },
          { label: '✏️ Start over', next: 'start' },
        ]);
      }, delay);
      return;
    }

    if (nodeId === 'submit_lead') {
      submitLead();
      return;
    }

    const msgs = node.msg ? (Array.isArray(node.msg) ? node.msg : [node.msg]) : [];

    const sendSequence = (msgs, idx=0) => {
      if (idx >= msgs.length) {
        if (node.input) {
          setInput(true, node.inputPlaceholder);
          window._mnCurrentNode = nodeId;
        } else {
          setOptions(node.opts || []);
        }
        return;
      }
      const typing = showTyping();
      const msgDelay = Math.min(600 + msgs[idx].length * 12, 1800);
      setTimeout(() => {
        removeTyping();
        addMsg(interpolate(msgs[idx]));
        sendSequence(msgs, idx + 1);
      }, idx === 0 ? delay : msgDelay);
    };
    sendSequence(msgs);
  }

  // ── Handle option click ────────────────────────────────
  function handleOption(opt) {
    addMsg(opt.label, 'user');
    if (opt.data) Object.assign(leadData, opt.data);
    setOptions([]);
    goTo(opt.next);
  }

  // ── Handle text input ──────────────────────────────────
  window.mnSendText = function() {
    const inp = el('mn-chat-input');
    const text = inp.value.trim();
    if (!text) return;
    addMsg(text, 'user');
    inp.value = '';
    setInput(false);

    const node = FLOW[window._mnCurrentNode];
    if (node && node.inputField) {
      leadData[node.inputField] = text;
      goTo(node.inputNext);
    }
  };

  el('mn-chat-input') && el('mn-chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.mnSendText();
  });

  // ── Submit lead via Web3Forms ──────────────────────────
  async function submitLead() {
    setOptions([]);
    addMsg("Sending your info to the team... ⏳");
    try {
      const body = new FormData();
      body.append('access_key', WEB3_KEY);
      body.append('subject', `New Lead from Metric Chatbot: ${leadData.name} — ${leadData.company}`);
      body.append('from_name', 'Metric Chatbot');
      body.append('name', leadData.name || '');
      body.append('company', leadData.company || '');
      body.append('phone', leadData.phone || '');
      body.append('service_interest', leadData.service || 'General Inquiry');
      body.append('source', 'Website Chatbot');
      body.append('botcheck', '');

      const res = await fetch('https://api.web3forms.com/submit', { method: 'POST', body });
      const data = await res.json();
      if (data.success) {
        addMsg("✅ **Sent!** Our team will reach out within 1 business day.");
      } else {
        throw new Error(data.message);
      }
    } catch(e) {
      addMsg(`No worries — you can also reach us directly:\n📞 **${PHONE}**\n📧 **${EMAIL}**`);
    }
    setTimeout(() => goTo('done', 200), 600);
  }

  // ── Toggle open/close ──────────────────────────────────
  let started = false;
  window.mnChatToggle = function() {
    isOpen = !isOpen;
    el('mn-chat-window').classList.toggle('open', isOpen);
    el('mn-chat-icon').style.display = isOpen ? 'none' : 'block';
    el('mn-chat-close').style.display = isOpen ? 'block' : 'none';
    el('mn-chat-pulse').style.display = isOpen ? 'none' : 'block';
    if (isOpen && !started) {
      started = true;
      setTimeout(() => goTo('start', 400), 200);
    }
  };

  // Auto-open after 8 seconds if user hasn't interacted
  setTimeout(() => {
    if (!isOpen && !started) window.mnChatToggle();
  }, 8000);

})();
</script>
